name: social-insights-studio

services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    env_file:
      - .env.database.local
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_INITDB_SKIP_TZINFO: "1"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:${MARIADB_PORT:-3307}:3306"
    volumes:
      - social-insights-mariadb-data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  social-insights-mariadb-data:
